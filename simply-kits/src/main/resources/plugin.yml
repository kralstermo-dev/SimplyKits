name: Kits
version: '1.0'
main: com.example.kits.KitsPlugin
api-version: '26.2'
description: Create kits from your inventory and give them to players with selectors.
author: YourName

commands:
  kitcreate:
    description: Save your current inventory as a kit.
    usage: /kitcreate <name>
    permission: kits.create
  kitgive:
    description: Give a kit to one or more players.
    usage: /kitgive <name> <selector>
    permission: kits.give
  kitlist:
    description: List all saved kits.
    usage: /kitlist
    permission: kits.list
  kitdelete:
    description: Delete a saved kit.
    usage: /kitdelete <name>
    permission: kits.delete
  kitrandom:
    description: Give a randomly chosen kit.
    usage: /kitrandom <player|selector>
    permission: kits.give
  kitrng:
    description: Give an independently-rolled random kit to each target.
    usage: /kitrng <player|selector>
    permission: kits.rng
  kits:
    description: Open a clickable menu of all kits.
    usage: /kits
    permission: kits.gui

permissions:
  kits.create:
    default: op
  kits.give:
    default: op
  kits.list:
    default: op
  kits.delete:
    default: op
  kits.gui:
    default: true
  kits.rng:
    default: op
